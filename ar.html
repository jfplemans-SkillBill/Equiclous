<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Solution - Débogage</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    #btn { position: fixed; top: 20px; left: 20px; z-index: 1000; padding: 10px; background: rgba(0,0,0,0.7); color: white; border: none; border-radius: 5px; }
    #debug { position: fixed; bottom: 20px; left: 0; right: 0; color: white; text-align: center; background: rgba(0,0,0,0.7); padding: 10px; z-index: 1000; font-family: monospace; font-size: 12px; }
  </style>
</head>
<body>
  <button id="btn" onclick="location.href='index.html'">← Retour</button>
  <div id="debug">Chargement...</div>

  <a-scene mindar-image="imageTargetSrc: targets.mind; autoStart: true;" embedded>
    <a-assets>
      <a-asset-item id="solutionModel" src="Duck.glb"></a-asset-item>
    </a-assets>
    <a-camera position="0 0 0"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <!-- Cube rouge pour vérifier la détection -->
      <a-box color="red" scale="0.1 0.1 0.1" position="0 0 -0.5" opacity="0.5"></a-box>

      <!-- Ton modèle avec débogage -->
      <a-entity
        id="myModel"
        gltf-model="#solutionModel"
        scale="0.1 0.1 0.1"
        position="0 0 -0.5"
        rotation="0 0 0"
        visible="true">
      </a-entity>
    </a-entity>
  </a-scene>

  <script>
    const debug = document.getElementById("debug");
    const model = document.getElementById("myModel");
    const target = document.querySelector("[mindar-image-target]");

    // Affiche les infos du modèle une fois chargé
    model.addEventListener("model-loaded", () => {
      const box = new THREE.Box3().setFromObject(model.object3D);
      const size = box.getSize(new THREE.Vector3());
      debug.innerHTML = `
        ✅ Modèle chargé<br>
        Taille: ${size.x.toFixed(2)}m x ${size.y.toFixed(2)}m x ${size.z.toFixed(2)}m<br>
        Position: ${model.object3D.position.x}, ${model.object3D.position.y}, ${model.object3D.position.z}<br>
        Échelle: ${model.object3D.scale.x}, ${model.object3D.scale.y}, ${model.object3D.scale.z}
      `;
      console.log("Modèle chargé. Taille:", size);
    });

    // Détection de la cible
    target.addEventListener("targetFound", () => {
      debug.innerHTML += "<br>✅ Cible détectée !";
      console.log("Cible détectée");
    });
    target.addEventListener("targetLost", () => {
      debug.innerHTML += "<br>❌ Cible perdue";
      console.log("Cible perdue");
    });
  </script>
</body>
</html>
