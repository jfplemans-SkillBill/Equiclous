<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR Solution</title>

  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      touch-action: none;
    }
    #video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      object-fit: cover;
      display: none;
    }
    #mirror-canvas {
      display: none;
    }
    a-scene {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      background: transparent !important;
      display: none !important;
    }
    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.9);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 10000;
      text-align: center;
      padding: 20px;
    }
    #overlay button {
      margin-top: 20px;
      padding: 15px 30px;
      background: #4285F4;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 18px;
    }
    #status {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      color: white;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px;
      z-index: 9999;
    }
    #debug {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.8);
      color: lime;
      font-family: monospace;
      font-size: 10px;
      padding: 5px;
      z-index: 9999;
      max-width: 90%;
      max-height: 30%;
      overflow: auto;
    }
    /* UI de scanning de MindAR */
    .mindar-ui-scanning {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 15px;
      border-radius: 10px;
      z-index: 9998;
      text-align: center;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div id="status">Appuyez sur le bouton pour démarrer</div>
  <div id="debug"></div>

  <!-- Flux vidéo -->
  <video id="video-bg" autoplay playsinline muted></video>

  <!-- Canvas pour inverser le flux (pour MindAR) -->
  <canvas id="mirror-canvas"></canvas>

  <!-- Scène AR -->
  <a-scene
    id="ar-scene"
    mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiScanning: true;"
    embedded
    vr-mode-ui="enabled: false">
    <a-assets>
      <a-asset-item id="solutionModel" src="solution.glb"></a-asset-item>
    </a-assets>
    <a-camera position="0 0 0" fov="60" near="0.1" far="1000"></a-camera>
    <!-- Cible avec cube ROUGE TRÈS VISIBLE -->
    <a-entity mindar-image-target="targetIndex: 0">
      <a-box color="red" scale="5 5 0.1" position="0 0 -0.5" opacity="0.9"></a-box>
      <a-entity
        id="myModel"
        gltf-model="#solutionModel"
        scale="0.5 0.5 0.5"
        position="0 0 -0.3">
      </a-entity>
    </a-entity>
  </a-scene>

  <!-- Overlay de démarrage -->
  <div id="overlay">
    <h2>📷 Activer la caméra</h2>
    <p>Appuyez sur le bouton pour autoriser l'accès à la caméra.</p>
    <button id="start-btn">🚀 DÉMARRER LA CAMÉRA</button>
  </div>

  <script>
    const videoBg = document.getElementById('video-bg');
    const mirrorCanvas = document.getElementById('mirror-canvas');
    const ctx = mirrorCanvas.getContext('2d');
    const arScene = document.getElementById('ar-scene');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('start-btn');
    const status = document.getElementById('status');
    const debug = document.getElementById('debug');
    const myModel = document.getElementById('myModel');

    let stream = null;
    let animationFrameId = null;
    let mindarController = null;

    function log(msg) {
      debug.textContent += msg + "\n";
      debug.scrollTop = debug.scrollHeight;
      console.log(msg);
    }

    // Fonction pour inverser la vidéo sur le canvas
    function drawMirroredVideo() {
      if (videoBg.readyState >= videoBg.HAVE_CURRENT_DATA) {
        mirrorCanvas.width = videoBg.videoWidth;
        mirrorCanvas.height = videoBg.videoHeight;
        ctx.save();
        ctx.scale(-1, 1);
        ctx.drawImage(videoBg, -mirrorCanvas.width, 0, mirrorCanvas.width, mirrorCanvas.height);
        ctx.restore();
      }
      animationFrameId = requestAnimationFrame(drawMirroredVideo);
    }

    startBtn.onclick = async function() {
      try {
        debug.textContent = "";
        status.textContent = "Demande d'accès à la caméra...";

        // 1. Demande la caméra
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "environment",
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });
        log("✅ Accès caméra accordé");

        // 2. Affiche le flux vidéo
        videoBg.srcObject = stream;
        await videoBg.play();
        videoBg.style.display = 'block';
        log("✅ Flux vidéo démarré");

        // 3. Démarre le dessin du canvas inversé
        drawMirroredVideo();

        // 4. Masque l'overlay
        overlay.style.display = 'none';
        arScene.style.display = 'block';
        status.textContent = "Scanne la cible...";

        // 5. Vérifie que targets.mind existe
        try {
          const response = await fetch('targets.mind');
          if (!response.ok) throw new Error("Fichier introuvable (404)");
          const blob = await response.blob();
          log(`✅ targets.mind chargé (${blob.size} octets)`);
        } catch (err) {
          log(`❌ ERREUR: ${err.message}`);
          status.textContent = "❌ Fichier targets.mind MANQUANT ou CORROMPU !";
          return;
        }

        // 6. Démarre MindAR avec le canvas inversé
        arScene.setAttribute('mindar-image', {
          imageTargetSrc: 'targets.mind',
          autoStart: true,
          showVideo: false,
          video: mirrorCanvas
        });
        log("✅ MindAR démarré (avec canvas inversé)");

        // 7. Récupère le contrôleur MindAR pour débogage
        mindarController = arScene.components['mindar-image'];
        log("MindAR controller: " + (mindarController ? "OK" : "NULL"));

        // 8. Écoute les événements
        const target = arScene.querySelector('[mindar-image-target]');
        target.addEventListener('targetFound', () => {
          status.textContent = "✅ CIBLE DÉTECTÉE !";
          status.style.background = "rgba(0, 255, 0, 0.7)";
          log("✅ Cible détectée !");
        });
        target.addEventListener('targetLost', () => {
          status.textContent = "❌ Cible perdue";
          status.style.background = "rgba(255, 0, 0, 0.5)";
          log("❌ Cible perdue");
        });

        // 9. Vérifie que le modèle est chargé
        myModel.addEventListener('model-loaded', () => {
          log("✅ Modèle 3D chargé !");
        });
        myModel.addEventListener('error', (e) => {
          log(`❌ Erreur modèle: ${e.detail.message}`);
        });

        // 10. Affiche l'UI de scanning de MindAR
        const scanningUI = document.createElement('div');
        scanningUI.className = 'mindar-ui-scanning';
        scanningUI.textContent = "🔍 Scannez la cible...";
        document.body.appendChild(scanningUI);

        // 11. Vérifie l'état de MindAR toutes les secondes
        setInterval(() => {
          if (mindarController) {
            log(`MindAR status: ${mindarController.data.autoStart ? "AutoStart=ON" : "AutoStart=OFF"} |
                Video: ${mindarController.data.video ? "OK" : "NULL"}`);
          }
        }, 1000);

      } catch (err) {
        console.error("Erreur:", err);
        log(`❌ ERREUR: ${err.name}: ${err.message}`);
        status.textContent = "❌ Erreur: " + err.message;
        if (err.name === 'NotAllowedError') {
          status.textContent += " → Autorisez la caméra !";
        }
        startBtn.style.display = 'block';
      }
    };

    // Arrêter l'animation quand on quitte
    window.addEventListener('beforeunload', () => {
      if (animationFrameId) cancelAnimationFrame(animationFrameId);
      if (stream) stream.getTracks().forEach(track => track.stop());
    });

    // Vérifie si la permission est déjà accordée
    if (navigator.permissions) {
      navigator.permissions.query({ name: 'camera' }).then(result => {
        if (result.state === 'granted') startBtn.click();
      });
    }
  </script>
</body>
</html>
