<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR Solution - Version J</title>

  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      touch-action: none;
    }
    /* Flux vidéo en arrière-plan */
    #video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      object-fit: cover;
      display: none;
    }
    /* Scène AR par-dessus */
    a-scene {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      background: transparent !important;
      display: none !important;
    }
    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.9);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 10000;
      text-align: center;
      padding: 20px;
    }
    #overlay button {
      margin-top: 20px;
      padding: 15px 30px;
      background: #4285F4;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 18px;
    }
    #status {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      color: white;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px;
      z-index: 9999;
    }
    #debug {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.8);
      color: lime;
      font-family: monospace;
      font-size: 10px;
      padding: 5px;
      z-index: 9999;
      max-width: 90%;
      max-height: 30%;
      overflow: auto;
    }
  </style>
</head>
<body>
  <div id="status">Version J - Initialisation...</div>
  <div id="debug">[J] Démarrage...</div>

  <!-- ÉLÉMENT VIDÉO POUR AFFICHER LE FLUX -->
  <video id="video-bg" autoplay playsinline muted></video>

  <!-- SCÈNE AR -->
  <a-scene
    id="ar-scene"
    mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiScanning: true;"
    embedded
    vr-mode-ui="enabled: false">
    <a-assets>
      <a-asset-item id="solutionModel" src="solution.glb"></a-asset-item>
    </a-assets>
    <a-camera position="0 0 0" fov="60" near="0.1" far="1000"></a-camera>
    <a-entity mindar-image-target="targetIndex: 0">
      <!-- Cube rouge de taille NORMALE -->
      <a-box color="red" scale="0.3 0.3 0.1" position="0 0 -0.5" opacity="1"></a-box>
      <a-entity id="myModel" gltf-model="#solutionModel" scale="0.5 0.5 0.5" position="0 0 -0.3"></a-entity>
    </a-entity>
  </a-scene>

  <div id="overlay">
    <h2>📷 Version J - Activer la caméra</h2>
    <p>Appuyez pour démarrer.</p>
    <button id="start-btn">🚀 DÉMARRER (Version J)</button>
  </div>

  <script>
    const videoBg = document.getElementById('video-bg');
    const arScene = document.getElementById('ar-scene');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('start-btn');
    const status = document.getElementById('status');
    const debug = document.getElementById('debug');
    const myModel = document.getElementById('myModel');

    let stream = null;

    function log(msg) {
      debug.textContent += `[J] ${msg}\n`;
      debug.scrollTop = debug.scrollHeight;
      console.log(`[J] ${msg}`);
    }

    startBtn.onclick = async function() {
      try {
        log("Démarrage de la caméra...");
        status.textContent = "Version J - Accès caméra...";

        // 1. Vérifie les fichiers
        const [targetsOk, modelOk] = await Promise.all([
          fetch('targets.mind').then(r => r.ok).catch(() => false),
          fetch('solution.glb').then(r => r.ok).catch(() => false)
        ]);

        if (!targetsOk) {
          log("❌ ERREUR: targets.mind MANQUANT");
          status.textContent = "❌ targets.mind introuvable !";
          return;
        }
        if (!modelOk) {
          log("❌ ERREUR: solution.glb MANQUANT");
          status.textContent = "❌ solution.glb introuvable !";
          return;
        }
        log("✅ Fichiers vérifiés");

        // 2. Active la caméra
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment", width: 1280, height: 720 },
          audio: false
        });
        log("✅ Caméra activée");

        // 3. Affiche le flux vidéo
        videoBg.srcObject = stream;
        await videoBg.play();
        videoBg.style.display = 'block';
        log("✅ Flux vidéo affiché");

        // 4. Masque l'overlay
        overlay.style.display = 'none';
        arScene.style.display = 'block';
        status.textContent = "Version J - Initialisation MindAR...";

        // 5. ATTEND 1 SECONDE
        await new Promise(resolve => setTimeout(resolve, 1000));
        log("✅ Délai écoulé");

        // 6. Démarre MindAR AVEC le flux vidéo
        arScene.setAttribute('mindar-image', {
          imageTargetSrc: 'targets.mind',
          autoStart: true,
          uiScanning: true,
          showVideo: false,  // Désactive le flux de MindAR (on gère nous-mêmes)
          video: videoBg     // Passe notre flux vidéo à MindAR
        });
        log("✅ MindAR démarré - Scanne la cible !");

        // 7. Écoute les événements
        const target = arScene.querySelector('[mindar-image-target]');
        target.addEventListener('targetFound', () => {
          log("✅ CIBLE DÉTECTÉE !");
          status.textContent = "Version J - Cible trouvée !";
          status.style.background = "rgba(0,255,0,0.5)";
        });
        target.addEventListener('targetLost', () => {
          log("❌ Cible perdue");
          status.style.background = "rgba(255,0,0,0.5)";
        });

        myModel.addEventListener('model-loaded', () => {
          log("✅ Modèle 3D chargé");
        });

      } catch (err) {
        log(`❌ ERREUR: ${err.name}: ${err.message}`);
        status.textContent = `Version J - Erreur: ${err.message}`;
        if (err.name === 'NotAllowedError') {
          status.textContent += " → Autorise la caméra !";
        }
      }
    };

    // Vérifie les permissions au chargement
    if (navigator.permissions) {
      navigator.permissions.query({ name: 'camera' }).then(result => {
        if (result.state === 'granted') startBtn.click();
      });
    }
  </script>
</body>
</html>
