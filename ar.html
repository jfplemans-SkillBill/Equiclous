<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR Solution</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      touch-action: none;
    }
    #video-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      display: none;
    }
    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* Corrige le miroir de la caméra */
    }
    #ar-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: none;
    }
    #btn {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 9999;
      padding: 10px;
      background: rgba(0,0,0,0.7);
      color: white;
      border: none;
      border-radius: 5px;
    }
    #status {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      color: white;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      z-index: 9999;
    }
    #camera-permission {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.95);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 10000;
      font-size: 18px;
      text-align: center;
      padding: 20px;
    }
    #camera-permission button {
      margin-top: 20px;
      padding: 15px 30px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
    }
    a-scene {
      width: 100% !important;
      height: 100% !important;
      display: block !important;
      background: transparent !important;
    }
  </style>
</head>
<body>
  <button id="btn" onclick="location.href='index.html'">← Retour</button>
  <div id="status">Autorise l'accès à la caméra...</div>

  <!-- Conteneur pour le flux vidéo pur -->
  <div id="video-container">
    <video id="video" autoplay playsinline muted></video>
  </div>

  <!-- Pop-up de permission -->
  <div id="camera-permission">
    <p>⚠️ Pour voir la réalité augmentée,<br>autorise l'accès à la caméra.</p>
    <button onclick="initAR()">Autoriser et démarrer</button>
  </div>

  <!-- Conteneur de la scène AR -->
  <div id="ar-container">
    <a-scene
      id="arScene"
      mindar-image="imageTargetSrc: targets.mind; autoStart: false;"
      embedded
      vr-mode-ui="enabled: false">

      <a-assets>
        <a-asset-item id="solutionModel" src="solution.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" fov="60" near="0.1" far="1000"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-box color="red" scale="0.1 0.1 0.1" position="0 0 -0.5" opacity="0.5"></a-box>
        <a-entity
          gltf-model="#solutionModel"
          scale="0.5 0.5 0.5"
          position="0 0 -0.3"
          rotation="0 0 0">
        </a-entity>
      </a-entity>
    </a-scene>
  </div>

  <!-- Chargement des scripts -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <script>
    const status = document.getElementById("status");
    const videoContainer = document.getElementById("video-container");
    const video = document.getElementById("video");
    const arContainer = document.getElementById("ar-container");
    const cameraPermission = document.getElementById("camera-permission");
    const arScene = document.getElementById("arScene");
    const target = document.querySelector("[mindar-image-target]");

    let stream = null;

    async function initAR() {
      try {
        // 1. Arrête le stream existant si nécessaire
        if (stream) {
          stream.getTracks().forEach(track => track.stop());
        }

        // 2. Demande l'accès à la caméra arrière
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "environment",
            width: { ideal: 1280 },
            height: { ideal: 720 }
          }
        });

        // 3. Affiche le flux vidéo dans l'élément <video>
        video.srcObject = stream;
        videoContainer.style.display = "block";

        // 4. Masque le pop-up et affiche la scène AR
        cameraPermission.style.display = "none";
        arContainer.style.display = "block";
        status.textContent = "Scanne la cible...";

        // 5. Démarre MindAR avec le flux vidéo
        arScene.setAttribute("mindar-image", {
          imageTargetSrc: "targets.mind",
          autoStart: true,
          uiScanning: false, // Désactive l'UI de scanning de MindAR (on gère nous-mêmes)
          video: video // Passe notre élément vidéo à MindAR
        });

        // 6. Gestion des événements
        arScene.addEventListener("loaded", () => {
          console.log("✅ Scène chargée");
        });

        target.addEventListener("targetFound", () => {
          status.textContent = "✅ Cible détectée !";
          status.style.background = "rgba(0, 255, 0, 0.7)";
          console.log("Cible détectée !");
        });

        target.addEventListener("targetLost", () => {
          status.textContent = "❌ Cible perdue";
          status.style.background = "rgba(255, 0, 0, 0.7)";
          console.log("Cible perdue");
        });

      } catch (err) {
        status.textContent = "❌ Erreur: " + err.message;
        console.error("Erreur caméra:", err);
        // Réaffiche le bouton en cas d'erreur
        cameraPermission.style.display = "flex";
      }
    }

    // Vérifie si la permission est déjà accordée
    if (navigator.permissions) {
      navigator.permissions.query({ name: "camera" }).then(result => {
        if (result.state === "granted") {
          initAR(); // Démarre automatiquement si déjà autorisé
        }
      });
    }
  </script>
</body>
</html>
