<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR Solution</title>

  <!-- Librairies -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      touch-action: none;
    }
    /* Flux vidéo en arrière-plan */
    #video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      object-fit: cover;
      transform: scaleX(-1);
      display: none;
    }
    /* Scène AR */
    a-scene {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      background: transparent !important;
      display: none !important;
    }
    /* Overlay de démarrage */
    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.9);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 10000;
      text-align: center;
      padding: 20px;
    }
    #overlay button {
      margin-top: 20px;
      padding: 15px 30px;
      background: #4285F4;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 18px;
      cursor: pointer;
    }
    #status {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      color: white;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <div id="status">Appuyez sur le bouton pour démarrer</div>

  <!-- ÉLÉMENT VIDÉO (flux caméra) -->
  <video id="video-bg" autoplay playsinline muted></video>

  <!-- SCÈNE AR (MindAR) -->
  <a-scene
    id="ar-scene"
    mindar-image="imageTargetSrc: targets.mind; autoStart: false; showVideo: true;"
    embedded
    vr-mode-ui="enabled: false">
    <a-assets>
      <a-asset-item id="solutionModel" src="solution.glb"></a-asset-item>
    </a-assets>
    <a-camera position="0 0 0" fov="60" near="0.1" far="1000"></a-camera>
    <a-entity mindar-image-target="targetIndex: 0">
      <a-box color="red" scale="0.1 0.1 0.1" position="0 0 -0.5" opacity="0.5"></a-box>
      <a-entity gltf-model="#solutionModel" scale="0.5 0.5 0.5" position="0 0 -0.3"></a-entity>
    </a-entity>
  </a-scene>

  <!-- BOUTON DE DÉMARRAGE -->
  <div id="overlay">
    <h2>📷 Activer la caméra</h2>
    <p>Appuyez sur le bouton pour autoriser l'accès à la caméra.</p>
    <button id="start-btn">🚀 DÉMARRER LA CAMÉRA</button>
  </div>

  <!-- JAVASCRIPT INTÉGRÉ ICI -->
  <script>
    // Récupération des éléments
    const videoBg = document.getElementById('video-bg');
    const arScene = document.getElementById('ar-scene');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('start-btn');
    const status = document.getElementById('status');

    let stream = null;

    // Fonction appelée quand on clique sur le bouton
    startBtn.onclick = async function() {
      try {
        // 1. Message de statut
        status.textContent = "Demande d'accès à la caméra...";

        // 2. Demande l'accès à la caméra ARRIÈRE
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "environment",  // Caméra arrière
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });

        // 3. Affiche le flux vidéo
        videoBg.srcObject = stream;
        await videoBg.play();
        videoBg.style.display = 'block';

        // 4. Masque l'overlay et affiche la scène AR
        overlay.style.display = 'none';
        arScene.style.display = 'block';
        status.textContent = "Scanne la cible...";

        // 5. Démarre MindAR avec notre flux vidéo
        arScene.setAttribute('mindar-image', {
          imageTargetSrc: 'targets.mind',
          autoStart: true,
          showVideo: true,  // Force l'affichage du flux
          video: videoBg    // Utilise notre élément vidéo
        });

        // 6. Écoute les événements de détection
        const target = arScene.querySelector('[mindar-image-target]');
        target.addEventListener('targetFound', () => {
          status.textContent = "✅ Cible détectée !";
          status.style.background = "rgba(0, 255, 0, 0.5)";
        });
        target.addEventListener('targetLost', () => {
          status.textContent = "❌ Cible perdue";
          status.style.background = "rgba(255, 0, 0, 0.5)";
        });

      } catch (err) {
        // Gestion des erreurs
        console.error("Erreur:", err);
        status.textContent = "❌ Erreur: " + err.message;
        if (err.name === 'NotAllowedError') {
          status.textContent += " → Autorisez la caméra dans les paramètres.";
        }
        startBtn.style.display = 'block'; // Réaffiche le bouton
      }
    };

    // Vérifie si la permission est déjà accordée
    if (navigator.permissions) {
      navigator.permissions.query({ name: 'camera' }).then(result => {
        if (result.state === 'granted') {
          startBtn.click(); // Démarre automatiquement
        }
      });
    }
  </script>
</body>
</html>
