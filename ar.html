<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR Solution</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      touch-action: none;
    }
    #video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      object-fit: cover;
      transform: scaleX(-1);
      display: none;
    }
    #ar-scene {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: none;
    }
    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.9);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 10000;
      text-align: center;
      padding: 20px;
    }
    #overlay button {
      margin-top: 20px;
      padding: 15px 30px;
      background: #4285F4;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 18px;
      cursor: pointer;
    }
    #status {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      color: white;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px;
      z-index: 9999;
    }
    .chrome-warning {
      color: #FFD700;
      margin-top: 15px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="status">Appuyez sur le bouton pour démarrer</div>

  <video id="video-bg" autoplay playsinline muted></video>

  <a-scene
    id="ar-scene"
    mindar-image="imageTargetSrc: targets.mind; autoStart: false;"
    embedded
    vr-mode-ui="enabled: false">
    <a-assets>
      <a-asset-item id="solutionModel" src="solution.glb"></a-asset-item>
    </a-assets>
    <a-camera position="0 0 0" fov="60" near="0.1" far="1000"></a-camera>
    <a-entity mindar-image-target="targetIndex: 0">
      <a-box color="red" scale="0.1 0.1 0.1" position="0 0 -0.5" opacity="0.5"></a-box>
      <a-entity gltf-model="#solutionModel" scale="0.5 0.5 0.5" position="0 0 -0.3"></a-entity>
    </a-entity>
  </a-scene>

  <div id="overlay">
    <h2>📷 Activer la caméra</h2>
    <p>Appuyez sur le bouton pour autoriser l'accès à la caméra.</p>
    <div class="chrome-warning" id="chrome-warning"></div>
    <button id="start-btn">🚀 DÉMARRER LA CAMÉRA</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <script>
    const videoBg = document.getElementById('video-bg');
    const arScene = document.getElementById('ar-scene');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('start-btn');
    const status = document.getElementById('status');
    const chromeWarning = document.getElementById('chrome-warning');

    // Détecter si c'est Chrome
    const isChrome = /Chrome/.test(navigator.userAgent);
    if (isChrome) {
      chromeWarning.textContent = "⚠️ Sur Chrome: Après avoir cliqué, autorisez la caméra dans la pop-up en haut de l'écran.";
    }

    let stream = null;

    startBtn.onclick = async function() {
      try {
        status.textContent = "Demande d'accès à la caméra...";

        // Configuration optimisée pour Chrome
        const constraints = {
          video: {
            facingMode: "environment",
            width: { ideal: 1280 },
            height: { ideal: 720 },
            frameRate: { ideal: 30 }
          },
          audio: false
        };

        // Demander l'accès
        stream = await navigator.mediaDevices.getUserMedia(constraints);

        // Afficher le flux vidéo
        videoBg.srcObject = stream;
        await videoBg.play().catch(e => {
          console.error("Erreur lecture vidéo:", e);
          throw new Error("Impossible de lire le flux vidéo: " + e.message);
        });
        videoBg.style.display = 'block';

        // Masquer l'overlay et afficher la scène
        overlay.style.display = 'none';
        arScene.style.display = 'block';
        status.textContent = "Scanne la cible...";

        // Démarrer MindAR
        arScene.setAttribute('mindar-image', {
          imageTargetSrc: 'targets.mind',
          autoStart: true,
          video: videoBg
        });

        // Écouter les événements
        const target = arScene.querySelector('[mindar-image-target]');
        target.addEventListener('targetFound', () => {
          status.textContent = "✅ Cible détectée !";
          status.style.background = "rgba(0, 255, 0, 0.5)";
        });
        target.addEventListener('targetLost', () => {
          status.textContent = "❌ Cible perdue";
          status.style.background = "rgba(255, 0, 0, 0.5)";
        });

      } catch (err) {
        console.error("Erreur:", err);
        status.textContent = "❌ Erreur: " + err.message;

        if (err.name === 'NotAllowedError') {
          status.textContent += " → Autorisez la caméra dans les paramètres.";
          chromeWarning.textContent = "⚠️ Vérifiez que Chrome a l'autorisation caméra (Paramètres → Applications → Chrome → Permissions).";
        } else if (err.name === 'NotFoundError') {
          status.textContent += " → Caméra non trouvée.";
        } else if (err.name === 'NotReadableError') {
          status.textContent += " → La caméra est déjà utilisée par une autre application.";
        }

        // Réafficher le bouton
        startBtn.style.display = 'block';
      }
    };

    // Vérifier si la permission est déjà accordée
    if (navigator.permissions) {
      navigator.permissions.query({ name: 'camera' }).then(result => {
        if (result.state === 'granted') {
          startBtn.click();
        } else if (result.state === 'denied') {
          chromeWarning.textContent = "⚠️ L'accès à la caméra a été refusé. Réactivez-le dans les paramètres.";
        }
      });
    }
  </script>
</body>
</html>
