<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR Solution</title>

  <!-- Ordre CRUCIAL : MindAR AVANT A-Frame -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent !important;
      touch-action: none; /* Désactive le scroll qui bloque la caméra */
    }
    a-scene {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      display: block !important;
    }
    #btn {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 9999;
      padding: 10px;
      background: rgba(0,0,0,0.7);
      color: white;
      border: none;
      border-radius: 5px;
    }
    #status {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      color: white;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      z-index: 9999;
      font-size: 14px;
    }
    #camera-permission {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.9);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 10000;
      font-size: 18px;
      text-align: center;
      padding: 20px;
    }
    #camera-permission button {
      margin-top: 20px;
      padding: 15px 30px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <button id="btn" onclick="location.href='index.html'">← Retour</button>
  <div id="status">Demande d'accès caméra en cours...</div>

  <!-- Pop-up pour demander l'autorisation caméra -->
  <div id="camera-permission">
    <p>⚠️ Autorise l'accès à la caméra pour voir la réalité augmentée.</p>
    <button onclick="requestCameraPermission()">Autoriser la caméra</button>
  </div>

  <!-- Scène AR -->
  <a-scene
    id="arScene"
    mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiScanning: true;"
    embedded
    arjs="sourceType: webcam; detectionMode: mono; trackingMethod: best;"
    render="fps: 60"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: true">

    <a-assets>
      <a-asset-item id="solutionModel" src="solution.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" fov="60" near="0.1" far="1000"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-box color="red" scale="0.1 0.1 0.1" position="0 0 -0.5" opacity="0.5"></a-box>
      <a-entity
        gltf-model="#solutionModel"
        scale="0.5 0.5 0.5"  <!-- Réduit de moitié (ton modèle était 2x trop grand) -->
        position="0 0 -0.3"
        rotation="0 0 0">
      </a-entity>
    </a-entity>
  </a-scene>

  <script>
    const status = document.getElementById("status");
    const arScene = document.getElementById("arScene");
    const cameraPermission = document.getElementById("camera-permission");
    const target = document.querySelector("[mindar-image-target]");

    // 1. Demande explicite de permission caméra
    function requestCameraPermission() {
      if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
          .then(() => {
            cameraPermission.style.display = "none";
            status.textContent = "Caméra activée. Scanne la cible...";
            arScene.setAttribute("mindar-image", "autoStart", "true");
            console.log("✅ Accès caméra accordé");
          })
          .catch(err => {
            status.textContent = "❌ Erreur caméra: " + err.message;
            console.error("Erreur caméra:", err);
          });
      } else {
        status.textContent = "❌ Navigateur non compatible avec la caméra";
      }
    }

    // 2. Vérification du chargement de la scène
    arScene.addEventListener("loaded", () => {
      status.textContent = "Scène chargée. Autorise la caméra...";
      console.log("✅ Scène chargée");
    });

    // 3. Détection de la cible
    target.addEventListener("targetFound", () => {
      status.textContent = "✅ Cible détectée !";
      status.style.background = "rgba(0, 255, 0, 0.7)";
      console.log("Cible détectée !");
    });

    target.addEventListener("targetLost", () => {
      status.textContent = "❌ Cible perdue";
      status.style.background = "rgba(255, 0, 0, 0.7)";
      console.log("Cible perdue");
    });

    // 4. Démarre automatiquement si la permission est déjà accordée
    if (navigator.permissions) {
      navigator.permissions.query({ name: "camera" }).then(result => {
        if (result.state === "granted") {
          cameraPermission.style.display = "none";
          arScene.setAttribute("mindar-image", "autoStart", "true");
        }
      });
    }
  </script>
</body>
</html>
