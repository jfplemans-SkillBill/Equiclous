<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR FINAL CORRIGÉ</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background: #000; }
    a-scene { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }
    #status {
      position: fixed; bottom: 20px; left: 0; right: 0;
      text-align: center; color: white;
      background: rgba(0,0,0,0.8); padding: 10px; z-index: 9999;
    }
  </style>
</head>
<body>
  <div id="status">Chargement...</div>

  <a-scene id="scene" embedded>
    <a-assets>
      <a-asset-item id="solutionModel" src="solution.glb" timeout="10000"></a-asset-item>
    </a-assets>

    <!-- Cube ROUGE toujours visible (pour test) -->
    <a-box color="red" scale="0.5 0.5 0.1" position="0 0 -1"></a-box>

    <!-- Cible avec cube BLEU + modèle -->
    <a-entity mindar-image-target="targetIndex: 0">
      <a-box color="blue" scale="0.3 0.3 0.1" position="0 0 -0.5"></a-box>
      <a-entity gltf-model="#solutionModel" scale="0.5 0.5 0.5" position="0 0 -0.3"></a-entity>
    </a-entity>
  </a-scene>

  <script>
    const scene = document.getElementById('scene');
    const status = document.getElementById('status');

    // 1. Vérifie que les fichiers existent
    Promise.all([
      fetch('targets.mind').catch(() => { throw new Error("targets.mind introuvable"); }),
      fetch('solution.glb').catch(() => { throw new Error("solution.glb introuvable"); })
    ])
    .then(() => {
      status.textContent = "Fichiers OK. Activation caméra...";

      // 2. Active la caméra
      return navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment", width: 1280, height: 720 },
        audio: false
      });
    })
    .then(stream => {
      status.textContent = "Caméra activée. Scanne la cible...";

      // 3. Démarre MindAR (SANS showVideo, qui n'existe pas)
      scene.setAttribute('mindar-image', {
        imageTargetSrc: 'targets.mind',
        autoStart: true,
        uiScanning: true
      });

      // 4. Écoute les événements
      const target = scene.querySelector('[mindar-image-target]');
      target.addEventListener('targetFound', () => {
        status.textContent = "✅ CIBLE DÉTECTÉE !";
        status.style.background = "rgba(0,255,0,0.5)";
      });
      target.addEventListener('targetLost', () => {
        status.textContent = "❌ Cible perdue";
        status.style.background = "rgba(255,0,0,0.5)";
      });
    })
    .catch(err => {
      status.textContent = `❌ ERREUR: ${err.message}`;
      status.style.background = "rgba(255,0,0,0.5)";
      console.error(err);
    });
  </script>
</body>
</html>
