<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR Solution - Version Q</title>

  <!-- Version plus récente d'A-Frame -->
  <script src="https://aframe.io/releases/1.4.5/aframe.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
    }
    a-scene {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 255, 0.3);
    }
    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.9);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 10000;
      text-align: center;
      padding: 20px;
    }
    #overlay button {
      margin-top: 20px;
      padding: 15px 30px;
      background: #4285F4;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 18px;
    }
    #status {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      color: white;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px;
      z-index: 9999;
    }
    #debug {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.8);
      color: lime;
      font-family: monospace;
      font-size: 10px;
      padding: 5px;
      z-index: 9999;
      max-width: 90%;
      max-height: 30%;
      overflow: auto;
    }
  </style>
</head>
<body>
  <div id="status">Version Q - Test A-Frame minimal</div>
  <div id="debug">[Q] Démarrage...</div>

  <!-- Scène A-Frame ultra-simple -->
  <a-scene id="ar-scene">
    <a-camera position="0 0 0"></a-camera>
    <a-box color="red" scale="5 5 5" position="0 0 -2" opacity="1"></a-box>
    <a-light type="ambient" color="#FFF"></a-light>
  </a-scene>

  <div id="overlay">
    <h2>🎯 Version Q - A-Frame minimal</h2>
    <p>Appuyez pour afficher le cube.</p>
    <button id="start-btn">🚀 AFFICHER (Version Q)</button>
  </div>

  <script>
    const arScene = document.getElementById('ar-scene');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('start-btn');
    const status = document.getElementById('status');
    const debug = document.getElementById('debug');

    function log(msg) {
      debug.textContent += `[Q] ${msg}\n`;
      debug.scrollTop = debug.scrollHeight;
      console.log(`[Q] ${msg}`);
    }

    // Vérifie que A-Frame est chargé
    function checkAFrame() {
      if (typeof AFRAME === 'undefined') {
        log("❌ A-Frame NON CHARGÉ !");
        status.textContent = "❌ A-Frame non chargé !";
        return false;
      }
      log("✅ A-Frame chargé (version " + AFRAME.version + ")");
      return true;
    }

    startBtn.onclick = function() {
      overlay.style.display = 'none';
      status.textContent = "Version Q - Cube devrait être visible...";

      if (checkAFrame()) {
        // Vérifie la scène après 1 seconde
        setTimeout(() => {
          const box = arScene.querySelector('a-box');
          log(`Cube existe: ${box ? 'OUI' : 'NON'}`);
          if (box) {
            log(`Position: ${box.getAttribute('position')}`);
            log(`Scale: ${box.getAttribute('scale')}`);
            log(`Color: ${box.getAttribute('color')}`);
            log(`Opacity: ${box.getAttribute('opacity')}`);
          }
        }, 1000);
      }
    };

    // Vérifie WebGL et A-Frame au chargement
    try {
      const canvas = document.createElement('canvas');
      const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
      if (gl) {
        log("✅ WebGL supporté");
      } else {
        log("❌ WebGL NON SUPPORTÉ");
        status.textContent = "❌ WebGL non supporté !";
      }
      checkAFrame();
    } catch (e) {
      log(`❌ Erreur: ${e.message}`);
      status.textContent = `❌ Erreur: ${e.message}`;
    }
  </script>
</body>
</html>
