<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR Solution - Version O</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
    }
    /* PAS DE FLUX VIDÉO */
    a-scene {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      background: rgba(0, 0, 255, 0.3) !important; /* Fond BLEU transparent */
    }
    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.9);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 10000;
      text-align: center;
      padding: 20px;
    }
    #overlay button {
      margin-top: 20px;
      padding: 15px 30px;
      background: #4285F4;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 18px;
    }
    #status {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      color: white;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px;
      z-index: 9999;
    }
    #debug {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.8);
      color: lime;
      font-family: monospace;
      font-size: 10px;
      padding: 5px;
      z-index: 9999;
      max-width: 90%;
      max-height: 30%;
      overflow: auto;
    }
  </style>
</head>
<body>
  <div id="status">Version O - Test A-Frame seul</div>
  <div id="debug">[O] Démarrage...</div>

  <!-- Scène A-Frame SEULE (sans flux vidéo) -->
  <a-scene id="ar-scene" embedded vr-mode-ui="enabled: false">
    <!-- Caméra -->
    <a-camera position="0 0 0" fov="90"></a-camera>
    <!-- Cube ROUGE ENORME au centre -->
    <a-box color="red" scale="5 5 5" position="0 0 -2" opacity="1"></a-box>
    <!-- Lumière pour mieux voir -->
    <a-light type="ambient" color="#BBB"></a-light>
    <a-light type="directional" intensity="0.5" position="-1 1 0"></a-light>
  </a-scene>

  <div id="overlay">
    <h2>🎯 Version O - Test A-Frame</h2>
    <p>Appuyez pour afficher le cube.</p>
    <button id="start-btn">🚀 AFFICHER LE CUBE (Version O)</button>
  </div>

  <script>
    const arScene = document.getElementById('ar-scene');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('start-btn');
    const status = document.getElementById('status');
    const debug = document.getElementById('debug');

    function log(msg) {
      debug.textContent += `[O] ${msg}\n`;
      debug.scrollTop = debug.scrollHeight;
      console.log(`[O] ${msg}`);
    }

    startBtn.onclick = function() {
      overlay.style.display = 'none';
      arScene.style.display = 'block';
      status.textContent = "Version O - Cube rouge devrait être visible...";
      log("✅ Scène A-Frame affichée");

      // Vérifie après 1 seconde
      setTimeout(() => {
        const box = arScene.querySelector('a-box');
        log(`Cube existe: ${box ? 'OUI' : 'NON'}`);
        log(`Cube position: ${box ? box.getAttribute('position') : 'N/A'}`);
        log(`Cube scale: ${box ? box.getAttribute('scale') : 'N/A'}`);
        log(`Cube visible: ${box ? box.getAttribute('opacity') : 'N/A'}`);
      }, 1000);
    };

    // Vérifie WebGL au chargement
    try {
      const canvas = document.createElement('canvas');
      const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
      if (gl) {
        log("✅ WebGL supporté");
      } else {
        log("❌ WebGL NON SUPPORTÉ");
        status.textContent = "❌ WebGL non supporté !";
      }
    } catch (e) {
      log(`❌ Erreur WebGL: ${e.message}`);
      status.textContent = `❌ Erreur WebGL: ${e.message}`;
    }
  </script>
</body>
</html>
