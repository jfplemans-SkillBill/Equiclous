<a-scene mindar-image="imageTargetSrc: targets.mind; autoStart: true;" embedded>
  <a-assets>
    <a-asset-item id="model" src="solution.glb"></a-asset-item>
  </a-assets>
  <a-camera position="0 0 0"></a-camera>
  <a-entity mindar-image-target="targetIndex: 0">
    <!-- Cube rouge pour vérifier la détection -->
    <a-box color="red" scale="0.1 0.1 0.1" position="0 0 -0.5"></a-box>
    <!-- Modèle 3D -->
    <a-entity
      id="myModel"
      gltf-model="#model"
      scale="10 10 10"
      position="0 10 -10"
      visible="true">
    </a-entity>
  </a-entity>
</a-scene>

<script>
  const model = document.getElementById("myModel");
  model.addEventListener("model-loaded", () => {
    console.log("✅ Modèle GLB chargé avec succès !");
    alert("Modèle chargé ! Vérifie la console pour plus de détails.");
  });

  const target = document.querySelector("[mindar-image-target]");
  target.addEventListener("targetFound", () => {
    console.log("Cible détectée ! Position du modèle :", model.object3D.position);
  });
</script>
