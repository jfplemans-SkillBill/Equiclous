<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR Solution - Version P</title>

  <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
    }
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.9);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 10000;
      text-align: center;
      padding: 20px;
    }
    #overlay button {
      margin-top: 20px;
      padding: 15px 30px;
      background: #4285F4;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 18px;
    }
    #status {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      color: white;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px;
      z-index: 9999;
    }
    #debug {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.8);
      color: lime;
      font-family: monospace;
      font-size: 10px;
      padding: 5px;
      z-index: 9999;
      max-width: 90%;
      max-height: 30%;
      overflow: auto;
    }
  </style>
</head>
<body>
  <div id="status">Version P - Test Three.js...</div>
  <div id="debug">[P] Démarrage...</div>

  <div id="canvas-container"></div>

  <div id="overlay">
    <h2>🎯 Version P - Test Three.js pur</h2>
    <p>Appuyez pour afficher le cube.</p>
    <button id="start-btn">🚀 AFFICHER LE CUBE (Version P)</button>
  </div>

  <script>
    const container = document.getElementById('canvas-container');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('start-btn');
    const status = document.getElementById('status');
    const debug = document.getElementById('debug');

    let scene, camera, renderer, cube;

    function log(msg) {
      debug.textContent += `[P] ${msg}\n`;
      debug.scrollTop = debug.scrollHeight;
      console.log(`[P] ${msg}`);
    }

    function initThreeJS() {
      try {
        // 1. Crée la scène
        scene = new THREE.Scene();
        log("✅ Scène Three.js créée");

        // 2. Crée la caméra
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;
        log("✅ Caméra créée");

        // 3. Crée le renderer
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000000, 0); // Fond transparent
        container.appendChild(renderer.domElement);
        log("✅ Renderer créé");

        // 4. Crée un cube rouge
        const geometry = new THREE.BoxGeometry(2, 2, 2);
        const material = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        cube = new THREE.Mesh(geometry, material);
        scene.add(cube);
        log("✅ Cube rouge créé");

        // 5. Animation
        function animate() {
          requestAnimationFrame(animate);
          cube.rotation.x += 0.01;
          cube.rotation.y += 0.01;
          renderer.render(scene, camera);
        }
        animate();
        log("✅ Animation démarrée");

        // 6. Redimensionnement
        window.addEventListener('resize', () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        });

        return true;
      } catch (err) {
        log(`❌ Erreur Three.js: ${err.message}`);
        return false;
      }
    }

    startBtn.onclick = function() {
      overlay.style.display = 'none';
      status.textContent = "Version P - Cube rouge devrait tourner...";

      if (initThreeJS()) {
        log("✅ Three.js initialisé avec succès");
      } else {
        status.textContent = "❌ Échec Three.js !";
      }
    };

    // Vérifie WebGL au chargement
    try {
      const canvas = document.createElement('canvas');
      const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
      if (gl) {
        log("✅ WebGL supporté");
      } else {
        log("❌ WebGL NON SUPPORTÉ");
        status.textContent = "❌ WebGL non supporté !";
      }
    } catch (e) {
      log(`❌ Erreur WebGL: ${e.message}`);
      status.textContent = `❌ Erreur WebGL: ${e.message}`;
    }
  </script>
</body>
</html>
