<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR Solution - Version N</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
    }
    /* Flux vidéo en arrière-plan (z-index: 0) */
    #video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      object-fit: cover;
      display: none;
    }
    /* Scène A-Frame DEVANT le flux (z-index: 1) */
    a-scene {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      background: rgba(0, 255, 0, 0.2) !important;
      z-index: 1 !important; /* DEVANT le flux vidéo */
      display: none !important;
    }
    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.9);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 10000;
      text-align: center;
      padding: 20px;
    }
    #overlay button {
      margin-top: 20px;
      padding: 15px 30px;
      background: #4285F4;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 18px;
    }
    #status {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      color: white;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px;
      z-index: 9999;
    }
    #debug {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.8);
      color: lime;
      font-family: monospace;
      font-size: 10px;
      padding: 5px;
      z-index: 9999;
      max-width: 90%;
      max-height: 30%;
      overflow: auto;
    }
  </style>
</head>
<body>
  <div id="status">Version N - Test cube...</div>
  <div id="debug">[N] Démarrage...</div>

  <!-- Flux vidéo -->
  <video id="video-bg" autoplay playsinline muted></video>

  <!-- Scène A-Frame avec cube TEST -->
  <a-scene id="ar-scene" embedded vr-mode-ui="enabled: false">
    <!-- Caméra à l'origine -->
    <a-camera position="0 0 0" fov="90"></a-camera>
    <!-- Cube ROUGE ENORME juste devant la caméra -->
    <a-box color="red" scale="10 10 0.1" position="0 0 -0.5" opacity="1"></a-box>
  </a-scene>

  <div id="overlay">
    <h2>🎯 Version N - Cube test</h2>
    <p>Appuyez pour tester.</p>
    <button id="start-btn">🚀 TESTER (Version N)</button>
  </div>

  <script>
    const videoBg = document.getElementById('video-bg');
    const arScene = document.getElementById('ar-scene');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('start-btn');
    const status = document.getElementById('status');
    const debug = document.getElementById('debug');

    function log(msg) {
      debug.textContent += `[N] ${msg}\n`;
      debug.scrollTop = debug.scrollHeight;
      console.log(`[N] ${msg}`);
    }

    startBtn.onclick = async function() {
      try {
        log("Démarrage...");
        status.textContent = "Version N - Test en cours...";

        // Active la caméra
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment", width: 1280, height: 720 },
          audio: false
        });
        log("✅ Caméra activée");

        // Affiche le flux vidéo
        videoBg.srcObject = stream;
        await videoBg.play();
        videoBg.style.display = 'block';
        log("✅ Flux vidéo affiché (z-index: 0)");

        // Affiche la scène A-Frame (z-index: 1)
        overlay.style.display = 'none';
        arScene.style.display = 'block';
        status.textContent = "Version N - Regarde le cube...";

        // Vérifie après 2 secondes
        setTimeout(() => {
          const box = arScene.querySelector('a-box');
          log(`Cube existe: ${box ? 'OUI' : 'NON'}`);
          log(`Cube position: ${box ? box.getAttribute('position') : 'N/A'}`);
          log(`Cube scale: ${box ? box.getAttribute('scale') : 'N/A'}`);
        }, 2000);

      } catch (err) {
        log(`❌ ERREUR: ${err.name}: ${err.message}`);
        status.textContent = `Version N - Erreur: ${err.message}`;
        if (err.name === 'NotAllowedError') {
          status.textContent += " → Autorise la caméra !";
        }
      }
    };
  </script>
</body>
</html>
