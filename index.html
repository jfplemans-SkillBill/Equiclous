<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeu d'Équilibre</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🪙 Jeu d'Équilibre</h1>
</header>

<main>

<section id="home">
  <h2>Bienvenue</h2>

  <p>
    Le but est de réussir une construction en équilibre.
  </p>

  <p>
    Si tu bloques, débloque les indices un par un.
  </p>

  <div id="buttons"></div>

  <div id="end" class="hidden">
    <h2>🎉 Bravo !</h2>

    <p class="quote">
      « La force de la nature réside dans son équilibre.  
      c’est parce que nous n’osons pas que c’est difficile. »
    </p>

    <button onclick="openVideo()">🎬 Solution vidéo</button>
    <button onclick="openAR()">📱 Solution 3D AR</button>
  </div>
</section>

<section id="imageView" class="hidden">
  <h2 id="title"></h2>
  <img id="img" src="">
  <br>
  <button onclick="back()">← Retour</button>
</section>

</main>

<footer>
  <button onclick="resetGame()">🔄 Recommencer</button>
</footer>

<script src="script.js"></script>
</body>
</html>
